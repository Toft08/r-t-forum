<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <title>Forum</title>
</head>
<body>
    <!-- nav bar -->
    <nav class="nav">
        <div class="nav-left">
            <a href="/"><span class="material-symbols-outlined" style="font-size: 40px">home</span></a>
        </div>
        <div class="nav-right">
            <p class="welcome-text">Logged in as: <strong>Username placeholder</strong></p>
            <form action="/logout" method="POST">
                <button type="submit" class="logout-button">Log Out</button>
            </form>
        </div>
    </nav>

    <div class="wrapper">
        <header>
            <h1>grit:forum</h1>
        </header>

        <div id="app">
            <!-- Login page -->
            <div id="login-form" class="page container">
                <h1>Login</h1>
                <form id="login-form-element">
                    <label for="username">Username</label>
                    <input type="text" id="login-username" name="username" placeholder="Enter your username" required>
                    
                    <label for="password">Password</label>
                    <input type="password" id="login-password" name="password" placeholder="Enter your password" required>
                    
                    <button type="submit">Login</button>
                </form>
                <br>
                <div class="signup-link">
                    Don't have an account? <button onclick="showPage('signup-form')">Register here</button>
                </div>
            </div>

            <!-- signup page -->
            <div id="signup-form" class="page container">
                <h1>Sign Up</h1>
                <form id="signup-form-element">
                    <label for="username">Username</label>
                    <input type="text" id="signup-username" name="username" placeholder="Enter your username" required>
                    
                    <label for="email">Email</label>
                    <input type="text" id="signup-email" name="email" placeholder="Enter your email" required>
            
                    <label for="password">Password</label>
                    <input type="password" id="signup-password" name="password" placeholder="Enter your password" required>
            
                    <div class="form-group">
                        <label for="register-age">Age</label>
                        <input type="number" id="register-age" required min="13">
                    </div>
                    <div class="form-group">
                        <label for="register-gender">Gender</label>
                        <select id="register-gender" required>
                            <option value="">Select gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Attack Helicopter</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="register-firstname">First Name</label>
                        <input type="text" id="register-firstname" required>
                    </div>
                    <div class="form-group">
                        <label for="register-lastname">Last Name</label>
                        <input type="text" id="register-lastname" required>
                    </div>

                    <button type="submit">Sign Up</button>
                </form>
                <div class="signup-link">Already have an account? 
                    <button type="button" onclick="showPage('login-form')">Back to Login</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/assets/js/auth.js"></script>

    <script>
        // Function to show only one page at a time
        function showPage(pageId) {
            // Hide all pages
            document.querySelectorAll('.page').forEach(page => {
                page.style.display = 'none';
            });
            // Show the page with the given id
            document.getElementById(pageId).style.display = 'block';
        }

        // Show login form by default
        window.onload = function() {
            showPage('login-form');
        }
    </script>
</body>
</html>
